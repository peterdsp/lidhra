" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#46584f">Google Play allows both full clients and remotes.</text><text x="588" y="306" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#46584f">Lidhra Android is a Tauri Mobile app that can run the</text><text x="588" y="332" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#46584f">engine locally OR act as a remote for a desktop / Pi —</text><text x="588" y="358" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#46584f">a toggle in setup. Same Material UI either way.</text><rect x="588" y="400" width="95.0" height="26" rx="7" fill="#f0f6f3" stroke="#d8e4dd" stroke-width="1"/><text x="635.5" y="417" font-family="Menlo, Consolas, monospace" font-size="11.5" font-weight="500" fill="#46584f" text-anchor="middle">Material 3</text><rect x="693.0" y="400" width="116.89999999999999" height="26" rx="7" fill="#f0f6f3" stroke="#d8e4dd" stroke-width="1"/><text x="751.45" y="417" font-family="Menlo, Consolas, monospace" font-size="11.5" font-weight="500" fill="#46584f" text-anchor="middle">Dynamic color</text><rect x="819.9" y="400" width="153.4" height="26" rx="7" fill="#f0f6f3" stroke="#d8e4dd" stroke-width="1"/><text x="896.6" y="417" font-family="Menlo, Consolas, monospace" font-size="11.5" font-weight="500" fill="#46584f" text-anchor="middle">Foreground service</text><rect x="983.3" y="400" width="109.6" height="26" rx="7" fill="#f0f6f3" stroke="#d8e4dd" stroke-width="1"/><text x="1038.1" y="417" font-family="Menlo, Consolas, monospace" font-size="11.5" font-weight="500" fill="#46584f" text-anchor="middle">Tauri Mobile</text></g>
