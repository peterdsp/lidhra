<style>
  :root{
    --grad:linear-gradient(135deg,#15C3B6,#2FD191 56%,#54E06A);
    --bg:#070f0c; --bg2:#0a1512; --panel:#0e1d17; --panel2:#12271f;
    --line:rgba(120,220,180,.13); --line2:rgba(120,220,180,.22);
    --fg:#eafff6; --soft:#a9c7bd; --mute:#6f8a7f; --acc:#63e6b0;
    --down:#22bd7a; --seed:#11a594; --pause:#8a94a8; --err:#e75555;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;
    background-image:radial-gradient(900px 500px at 82% -8%,rgba(47,209,145,.09),transparent 60%)}
  a{color:var(--acc);text-decoration:none}
  .mono{font-family:var(--mono)}
  .app{display:grid;grid-template-columns:212px 1fr;height:100vh}
  @media(max-width:640px){.app{grid-template-columns:1fr}.side{display:none}}
  .side{border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column;gap:4px;
    background:linear-gradient(180deg,rgba(255,255,255,.03),transparent)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.02em;font-size:16px;padding:4px 8px 14px}
  .brand svg{width:24px;height:24px}
  .grp{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);padding:14px 10px 6px}
  .nav{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;color:var(--soft);cursor:pointer;font-size:13.5px}
  .nav:hover{background:rgba(120,220,180,.06)}
  .nav.on{background:rgba(17,165,148,.16);color:var(--acc);font-weight:600}
  .nav .ic{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .nav .c{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--mute)}
  .side .foot{margin-top:auto;border-top:1px solid var(--line);padding-top:12px;display:flex;flex-direction:column;gap:10px}
  .conn{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--soft);padding:0 8px}
  .conn .dot{width:8px;height:8px;border-radius:50%;background:var(--pause)}
  .conn .dot.on{background:var(--down)}
  .conn a{margin-left:auto;font-size:12px}
  .pform{display:none;flex-direction:column;gap:8px;padding:0 8px}
  .pform.show{display:flex}
  select,input{background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--fg);font:inherit;font-size:12.5px;padding:8px 10px;outline:none}
  select:focus,input:focus{border-color:var(--acc)}
  .pform button{font:inherit;font-size:12.5px;font-weight:700;border:none;border-radius:8px;padding:8px;background:var(--grad);color:#06251b;cursor:pointer}
  .pform .msg{font-family:var(--mono);font-size:10.5px;color:var(--soft);min-height:12px}
  .pform .msg.err{color:var(--err)}
  .lang{display:flex;align-items:center;gap:8px;padding:0 8px}
  .lang select{flex:1;font-size:12px;padding:6px 8px}
  .main{display:flex;flex-direction:column;min-width:0}
  .lic{display:none;align-items:center;gap:12px;padding:10px 18px;font-size:13px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .lic.show{display:flex}
  .lic.trial{background:rgba(47,209,145,.08);color:var(--soft)}
  .lic.expired{background:rgba(231,85,85,.1);color:var(--fg)}
  .lic b{color:var(--acc)}
  .lic input{flex:1;min-width:200px;max-width:340px;font-family:var(--mono);font-size:12px}
  .lic button{font:inherit;font-size:12.5px;font-weight:700;border:none;border-radius:8px;padding:8px 14px;background:var(--grad);color:#06251b;cursor:pointer}
  .lic a{margin-left:auto}
  .bar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(10,21,18,.6);backdrop-filter:blur(10px)}
  .bar input{flex:1;min-width:0;border-radius:100px;font-family:var(--mono);font-size:13px;padding:10px 16px}
  .bar button{font:inherit;font-size:13.5px;font-weight:700;border:none;border-radius:100px;padding:10px 20px;background:var(--grad);color:#06251b;cursor:pointer}
  .bar .sum{font-family:var(--mono);font-size:11px;color:var(--mute);white-space:nowrap}
  .msg2{font-family:var(--mono);font-size:11px;color:var(--soft);padding:6px 18px 0;min-height:14px}
  .msg2.err{color:var(--err)} .msg2.ok{color:var(--acc)}
  .scroll{flex:1;overflow:auto;padding:14px 18px 40px}
  .sec{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin:14px 4px 10px}
  .sec:first-child{margin-top:0}
  .list{display:flex;flex-direction:column;gap:8px}
  .empty{color:var(--mute);font-size:13px;padding:14px 4px}
  .row{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  .row:hover{border-color:var(--line2)}
  .row .st{width:34px;height:34px;border-radius:9px;flex:0 0 auto;display:grid;place-items:center;color:#04120c;font-family:var(--mono);font-size:13px;font-weight:700}
  .row .body{flex:1;min-width:0}
  .row .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .hb{height:5px;border-radius:100px;background:rgba(120,150,140,.22);overflow:hidden;margin:8px 0 6px}
  .row .hb>i{display:block;height:100%;border-radius:100px}
  .row .meta{font-family:var(--mono);font-size:10.5px;color:var(--mute);display:flex;gap:10px}
  .row .right{text-align:right;flex:0 0 auto;min-width:76px}
  .row .pct{font-family:var(--mono);font-size:13px;font-weight:700}
  .row .act{font-family:var(--mono);font-size:11px;display:inline-block;margin-top:4px;cursor:pointer}
  .pill{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:100px}
  .pill.Downloading{background:rgba(34,189,122,.16);color:var(--down)}
  .pill.Seeding,.pill.Ready{background:rgba(17,165,148,.18);color:#3ce0c0}
  .pill.Queued{background:rgba(138,148,168,.18);color:var(--pause)}
  .pill.Error{background:rgba(231,85,85,.16);color:var(--err)}
</style>
</head>

<script>
  // ---------- i18n: English, Greek, Albanian ----------
  const I18N = {
    en: {
      library:"Library", nav_overview:"Overview", nav_downloading:"Downloading", nav_seeding:"Seeding", nav_queued:"Queued",

      sec_cloud:"Cloud transfers", sec_downloads:"Downloads",

      trial_left:"{0} day(s) left in your free trial.", get_license:"Get a license",

      link_download:"download", files:"{0} file(s)", transfers:"{0} transfer(s)", queued_n:"{0} queued", premium:"premium",
    },
    el: {
      library:"Βιβλιοθήκη", nav_overview:"Επισκόπηση", nav_downloading:"Λήψη", nav_seeding:"Διαμοιρασμός", nav_queued:"Σε αναμονή",
      conn_not:"Μη συνδεδεμένο", conn_connect:"Σύνδεση", conn_change:"Αλλαγή", ph_token:"Διακριτικό API", btn_connect_account:"Σύνδεση λογαριασμού",
      ph_add:"Επικόλλησε magnet, info-hash ή σύνδεσμο https://", btn_add:"Προσθήκη",
      sec_cloud:"Μεταφορές cloud", sec_downloads:"Λήψεις",
      empty_connect:"Σύνδεσε τον λογαριασμό debrid, μετά πρόσθεσε ένα magnet.", empty_none:"Καμία μεταφορά εδώ.", empty_dl:"Καμία λήψη ακόμη.",
      st_downloading:"λήψη", st_seeding:"διαμοιρασμός", st_ready:"έτοιμο", st_done:"ολοκληρώθηκε", st_queued:"σε αναμονή", st_error:"σφάλμα",
      trial_left:"{0} ημέρα(ες) απομένουν στη δωρεάν δοκιμή σου.", get_license:"Απόκτησε άδεια",
      trial_ended:"Η δωρεάν δοκιμή έληξε.", act_email:"Ενεργοποίηση με το email σου στο Ko-fi", email_ph:"το email σου στο Ko-fi", activate:"Ενεργοποίηση", buy_kofi:"Αγορά στο Ko-fi",
      m_connecting:"σύνδεση...", m_adding:"προσθήκη...", m_starting:"έναρξη λήψης...", m_added:"προστέθηκε",
      m_need_connect:"σύνδεσε τον λογαριασμό debrid για να προσθέσεις magnet", m_enter_token:"εισήγαγε το διακριτικό API", m_invalid:"μη έγκυρο κλειδί",
      link_download:"λήψη", files:"{0} αρχείο(α)", transfers:"{0} μεταφορά(ές)", queued_n:"{0} σε αναμονή", premium:"premium",
    },
    sq: {
      library:"Biblioteka", nav_overview:"Përmbledhje", nav_downloading:"Duke shkarkuar", nav_seeding:"Duke shpërndarë", nav_queued:"Në radhë",
      conn_not:"I palidhur", conn_connect:"Lidhu", conn_change:"Ndrysho", ph_token:"Token API", btn_connect_account:"Lidh llogarinë",
      ph_add:"Ngjit një magnet, info-hash, ose një lidhje https://", btn_add:"Shto",
      sec_cloud:"Transferime cloud", sec_downloads:"Shkarkimet",
      empty_connect:"Lidh llogarinë tënde debrid, pastaj shto një magnet.", empty_none:"Asnjë transferim këtu.", empty_dl:"Asgjë në shkarkim ende.",
      st_downloading:"duke shkarkuar", st_seeding:"shpërndarje", st_ready:"gati", st_done:"përfunduar", st_queued:"në radhë", st_error:"gabim",
      trial_left:"{0} ditë të mbetura në provën tënde falas.", get_license:"Merr një licencë",
      trial_ended:"Prova jote falas mbaroi.", act_email:"Aktivizo me email-in tënd të Ko-fi", email_ph:"email-i yt i Ko-fi", activate:"Aktivizo", buy_kofi:"Blej në Ko-fi",
      m_connecting:"duke u lidhur...", m_adding:"duke shtuar...", m_starting:"duke nisur shkarkimin...", m_added:"u shtua",
      m_need_connect:"lidh llogarinë debrid për të shtuar magnet", m_enter_token:"fut token-in API", m_invalid:"çelës i pavlefshëm",
      link_download:"shkarko", files:"{0} skedar(ë)", transfers:"{0} transferim(e)", queued_n:"{0} në radhë", premium:"premium",
    },
  };
  let lang = localStorage.getItem('lidhra_lang')
    || (navigator.language||'en').slice(0,2).replace(/^(el|sq)$/, m=>m) ;
  if(!I18N[lang]) lang = 'en';
  function t(key, a){ let s=(I18N[lang]&&I18N[lang][key]) || I18N.en[key] || key; return a!==undefined? s.replace('{0}',a):s; }
  function applyI18n(){
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
    document.querySelectorAll('[data-i18n-ph]').forEach(el=>el.placeholder=t(el.dataset.i18nPh));
  }
  function stLabel(s){ return t({Downloading:'st_downloading',Seeding:'st_seeding',Ready:'st_ready',Queued:'st_queued',Error:'st_error'}[s]||'st_'+s); }

  // ---------- backend (browser -> /api, Tauri -> invoke) ----------
  const TAURI = !!(window.__TAURI__ && window.__TAURI__.core);
  const ROUTES = {
    providers:['GET','/api/providers'], connect:['POST','/api/connect'],
    add:['POST','/api/add'], fetch:['POST','/api/fetch'],
    transfers:['GET','/api/transfers'], download:['POST','/api/download'], downloads:['GET','/api/downloads'],
    license:['GET','/api/license'], license_activate:['POST','/api/license'],
    license_activate_email:['POST','/api/license/email'],
  };
  async function api(name,args){
    if(TAURI) return window.__TAURI__.core.invoke(name,args||{});
    const [m,u]=ROUTES[name];
    const opt = m==='GET'?{}:{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(args||{})};
    const r=await fetch(u,opt); const d=await r.json().catch(()=>({error:r.statusText}));
    if(!r.ok) throw new Error(d.error||r.statusText); return d;
  }
  const $=s=>document.querySelector(s);
  const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  let connected=false, filter='all', tpoll=null, lastTx=[];
  const COLOR={Downloading:'var(--down)',Seeding:'var(--seed)',Ready:'var(--seed)',Queued:'var(--pause)',Error:'var(--err)'};
  const GLYPH={Downloading:'↓',Seeding:'↑',Ready:'✓',Queued:'‖',Error:'!'};

  async function init(){
    $('#lang').value=lang; applyI18n();
    $('#lang').onchange=()=>{ lang=$('#lang').value; localStorage.setItem('lidhra_lang',lang); applyI18n(); renderTx(lastTx); refreshDownloads(); refreshLicense(); };
    try{ const p=await api('providers'); $('#provider').innerHTML=p.map(x=>`<option value="${x.id}">${x.label}</option>`).join(''); }catch(e){}
    document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>{
      document.querySelectorAll('.nav').forEach(x=>x.classList.remove('on'));
      n.classList.add('on'); filter=n.dataset.f; renderTx(lastTx);
    });
    $('#toggle').onclick=e=>{e.preventDefault(); $('#pform').classList.toggle('show');};
    $('#connect').onclick=doConnect;
    $('#add-btn').onclick=doAdd;
    $('#add-in').addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
    renderTx([]);
    refreshDownloads(); setInterval(refreshDownloads,1500);
    refreshLicense(); setInterval(refreshLicense,30000);
  }

  async function doConnect(){
    const provider=$('#provider').value, token=$('#token').value.trim();
    if(!token){ $('#cmsg').textContent=t('m_enter_token'); $('#cmsg').className='msg err'; return; }
    $('#cmsg').textContent=t('m_connecting'); $('#cmsg').className='msg';
    try{
      const a=await api('connect',{provider,token});
      connected=true; $('#dot').classList.add('on');
      $('#conn').textContent=a.username||''; $('#toggle').textContent=t('conn_change');
      $('#pform').classList.remove('show'); $('#cmsg').textContent='';
      startTransfers();
    }catch(e){ connected=false; $('#dot').classList.remove('on'); $('#cmsg').textContent=e.message; $('#cmsg').className='msg err'; }
  }

  async function doAdd(){
    const v=$('#add-in').value.trim(); if(!v) return;
    const isUrl=/^https?:\/\//i.test(v);
    if(!isUrl && !connected){ msg('#amsg',t('m_need_connect'),'err'); return; }
    msg('#amsg', isUrl?t('m_starting'):t('m_adding'));
    try{
      if(isUrl){ await api('fetch',{url:v}); refreshDownloads(); }
      else { await api('add',{magnet:v}); refreshTransfers(); }
      $('#add-in').value=''; msg('#amsg',t('m_added'),'ok');
    }catch(e){ msg('#amsg',e.message,'err'); }
  }
  function msg(sel,text,cls){ const el=$(sel); el.textContent=text||''; el.className='msg2'+(cls?' '+cls:''); }

  function startTransfers(){ if(tpoll)clearInterval(tpoll); refreshTransfers(); tpoll=setInterval(refreshTransfers,2500); }
  async function refreshTransfers(){ if(!connected) return; try{ lastTx=await api('transfers'); renderTx(lastTx); counts(lastTx); }catch(e){} }
  function counts(items){
    const by=s=>items.filter(x=>x.status===s).length;
    $('#c-all').textContent=items.length; $('#c-Downloading').textContent=by('Downloading');
    $('#c-Seeding').textContent=by('Seeding'); $('#c-Queued').textContent=by('Queued');
    $('#sum').textContent=t('transfers',items.length);
  }
  function renderTx(items){
    const el=$('#tlist');
    const list=filter==='all'?items:items.filter(x=>x.status===filter);
    if(!list.length){ el.innerHTML='<div class="empty">'+(connected?t('empty_none'):t('empty_connect'))+'</div>'; return; }
    el.innerHTML=list.map(x=>{
      const pct=Math.round((x.progress||0)*100), col=COLOR[x.status]||'var(--pause)';
      return `<div class="row"><div class="st" style="background:${col}">${GLYPH[x.status]||''}</div>
        <div class="body"><div class="nm">${esc(x.name||x.id)}</div>
          <div class="hb"><i style="width:${pct}%;background:${col}"></i></div>
          <div class="meta"><span class="pill ${x.status}">${stLabel(x.status)}</span>${x.links?`<span>${t('files',x.links)}</span>`:''}</div></div>
        <div class="right"><div class="pct">${pct}%</div>${x.status==='Ready'?`<a class="act" data-dl="${x.id}">${t('link_download')}</a>`:''}</div></div>`;
    }).join('');
    el.querySelectorAll('[data-dl]').forEach(a=>a.onclick=async()=>{
      a.textContent='...';
      try{ const r=await api('download',{id:a.dataset.dl}); a.textContent=t('queued_n',r.started||0); refreshDownloads(); }
      catch(e){ a.textContent=t('st_error'); }
    });
  }
  async function refreshDownloads(){
    try{
      const items=await api('downloads'); const el=$('#dlist');
      if(!items.length){ el.innerHTML='<div class="empty">'+t('empty_dl')+'</div>'; return; }
      el.innerHTML=items.map(d=>{
        const pct=d.done&&!d.error?100:Math.round((d.progress||0)*100);
        const mb=(d.downloaded/1e6).toFixed(1), tot=d.total?(d.total/1e6).toFixed(1):'?';
        const status=d.error?'Error':(d.done?'Ready':'Downloading'), col=COLOR[status];
        const label=d.error?t('st_error'):(d.done?t('st_done'):t('st_downloading'));
        return `<div class="row"><div class="st" style="background:${col}">${GLYPH[status]}</div>
          <div class="body"><div class="nm">${esc(d.name)}</div>
            <div class="hb"><i style="width:${pct}%;background:${col}"></i></div>
            <div class="meta"><span class="pill ${status}">${label}</span><span>${d.error?esc(d.error):`${mb} / ${tot} MB`}</span></div></div>
          <div class="right"><div class="pct">${pct}%</div></div></div>`;
      }).join('');
    }catch(e){}
  }
  async function refreshLicense(){
    try{
      const l=await api('license'); const el=$('#lic');
      if(l.state==='licensed'){ el.className='lic'; el.innerHTML=''; return; }
      if(l.state==='trial'){ el.className='lic trial show';
        el.innerHTML=`<span><b>${l.days_left}</b> ${t('trial_left',l.days_left).replace(/^\S+\s/,'')}</span><a href="https://ko-fi.com/peterdsp" target="_blank">${t('get_license')}</a>`; return; }
      el.className='lic expired show';
      el.innerHTML=`<span>${t('trial_ended')}</span><input id="lemail" type="email" placeholder="${t('email_ph')}"><button id="lactemail">${t('act_email')}</button><input id="lkey" placeholder="LIDHRA-..."><button id="lact">${t('activate')}</button><a href="https://ko-fi.com/s/4bbb9c112a" target="_blank">${t('buy_kofi')}</a>`;
      $('#lactemail').onclick=async()=>{ const em=$('#lemail').value.trim(); if(!em) return; const b=$('#lactemail'); b.textContent='...';
        try{ await api('license_activate_email',{email:em}); refreshLicense(); }catch(e){ b.textContent=e.message||t('m_invalid'); } };
      $('#lact').onclick=async()=>{ const k=$('#lkey').value.trim(); if(!k) return; $('#lact').textContent='...';
        try{ await api('license_activate',{key:k}); refreshLicense(); }catch(e){ $('#lact').textContent=t('m_invalid'); } };
    }catch(e){}
  }
  init();
</script>
</body>
</html>
